<svg width="1200" height="720" viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Global Store Retail Performance and Profitability Analysis Database Schema</title>
  <desc id="desc">Entity relationship diagram showing customers, orders, products, and sales tables with relationships used in the Global Store analytics project.</desc>

  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .table { fill: #ffffff; stroke: #1f2937; stroke-width: 2; rx: 10; }
      .header { fill: #2563eb; }
      .header-text { fill: #ffffff; font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; }
      .field { fill: #111827; font-family: Arial, sans-serif; font-size: 14px; }
      .pk { fill: #b45309; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .fk { fill: #047857; font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; }
      .line { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { fill: #374151; font-family: Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .note { fill: #475569; font-family: Arial, sans-serif; font-size: 15px; }
      .title { fill: #0f172a; font-family: Arial, sans-serif; font-size: 28px; font-weight: 800; }
      .subtitle { fill: #475569; font-family: Arial, sans-serif; font-size: 16px; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="720"/>
  <text class="title" x="60" y="52">Global Store Retail Performance &amp; Profitability Analysis</text>
  <text class="subtitle" x="60" y="78">Database schema used for MySQL business analysis and Power BI reporting</text>

  <g transform="translate(70,150)">
    <rect class="table" x="0" y="0" width="300" height="170"/>
    <rect class="header" x="0" y="0" width="300" height="42" rx="10"/>
    <text class="header-text" x="20" y="27">customers</text>
    <text class="pk" x="20" y="70">PK customer_id VARCHAR(50)</text>
    <text class="field" x="20" y="98">customer_name VARCHAR(255)</text>
    <text class="field" x="20" y="126">segment VARCHAR(100)</text>
  </g>

  <g transform="translate(70,420)">
    <rect class="table" x="0" y="0" width="300" height="200"/>
    <rect class="header" x="0" y="0" width="300" height="42" rx="10"/>
    <text class="header-text" x="20" y="27">products</text>
    <text class="pk" x="20" y="70">PK product_id VARCHAR(50)</text>
    <text class="field" x="20" y="98">product_name VARCHAR(1000)</text>
    <text class="field" x="20" y="126">category VARCHAR(100)</text>
    <text class="field" x="20" y="154">sub_category VARCHAR(100)</text>
  </g>

  <g transform="translate(475,110)">
    <rect class="table" x="0" y="0" width="315" height="330"/>
    <rect class="header" x="0" y="0" width="315" height="42" rx="10"/>
    <text class="header-text" x="20" y="27">orders</text>
    <text class="pk" x="20" y="70">PK order_id VARCHAR(50)</text>
    <text class="field" x="20" y="98">order_date DATE</text>
    <text class="field" x="20" y="126">ship_date DATE</text>
    <text class="field" x="20" y="154">ship_mode VARCHAR(100)</text>
    <text class="fk" x="20" y="182">FK customer_id VARCHAR(50)</text>
    <text class="field" x="20" y="210">city, state, country</text>
    <text class="field" x="20" y="238">postal_code DECIMAL(20,2)</text>
    <text class="field" x="20" y="266">market VARCHAR(100)</text>
    <text class="field" x="20" y="294">region VARCHAR(100)</text>
    <text class="field" x="20" y="322">order_priority VARCHAR(50)</text>
  </g>

  <g transform="translate(890,235)">
    <rect class="table" x="0" y="0" width="270" height="260"/>
    <rect class="header" x="0" y="0" width="270" height="42" rx="10"/>
    <text class="header-text" x="20" y="27">sales</text>
    <text class="pk" x="20" y="70">PK row_id INT</text>
    <text class="fk" x="20" y="98">FK order_id VARCHAR(50)</text>
    <text class="fk" x="20" y="126">FK product_id VARCHAR(50)</text>
    <text class="field" x="20" y="154">sales DECIMAL(14,4)</text>
    <text class="field" x="20" y="182">quantity INT</text>
    <text class="field" x="20" y="210">discount DECIMAL(5,4)</text>
    <text class="field" x="20" y="238">profit DECIMAL(14,4)</text>
    <text class="field" x="20" y="266">shipping_cost DECIMAL(14,4)</text>
  </g>

  <path class="line" d="M370 235 C420 235, 425 275, 475 275"/>
  <text class="label" x="388" y="220">1 customer</text>
  <text class="label" x="408" y="296">many orders</text>

  <path class="line" d="M790 275 C835 275, 845 305, 890 330"/>
  <text class="label" x="808" y="260">1 order</text>
  <text class="label" x="805" y="320">many sales rows</text>

  <path class="line" d="M370 520 C620 520, 650 392, 890 365"/>
  <text class="label" x="392" y="548">1 product</text>
  <text class="label" x="680" y="405">many sales rows</text>

  <text class="note" x="70" y="675">Model purpose: support SQL KPI queries, profitability analysis, customer segmentation, shipping analysis, and Power BI reporting.</text>
</svg>
